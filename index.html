<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RE:FEEEL AX</title>
<style>
  :root{
    --paper:#faf8f4; --ink:#1c1a17; --ink2:#3f3b35; --mut:#9a9489; --faint:#c4bdb1;
    --line:#e7e2d8; --accent:#d94e26; --green:#2f8f57; --sidebar:#f4f1ea;
    --serif:'AppleMyungjo','Nanum Myeongjo',Georgia,'Times New Roman',serif;
    --sans:'Apple SD Gothic Neo',-apple-system,BlinkMacSystemFont,'Malgun Gothic',sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;display:flex;height:100vh;overflow:hidden;font-size:15px;line-height:1.6}
  ::selection{background:#f3d9cf}

  /* ── 사이드바 ── */
  .side{width:236px;flex:none;background:var(--sidebar);border-right:1px solid var(--line);display:flex;flex-direction:column;padding:26px 18px;overflow-y:auto}
  .mark{font-family:var(--serif);font-size:20px;letter-spacing:.01em;margin-bottom:2px}
  .mark .ax{color:var(--accent)}
  .tag{font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint);margin-bottom:26px}
  .navsec{font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);padding:18px 8px 7px}
  .nav{display:flex;align-items:center;gap:11px;padding:7px 9px;border-radius:7px;cursor:pointer;font-size:13.5px;color:var(--ink2);transition:background .12s}
  .nav:hover{background:#ece8df}
  .nav.active{color:var(--ink);font-weight:600}
  .nav.active .ic{filter:none}
  .nav .ic{width:17px;text-align:center;font-size:14px;opacity:.85}
  .nav .soon{margin-left:auto;font-size:9px;letter-spacing:.1em;color:var(--faint);text-transform:uppercase}
  .side .foot{margin-top:auto;padding-top:14px;border-top:1px solid var(--line)}
  .vstat{font-size:11px;color:var(--mut);margin-bottom:9px;line-height:1.4}
  .side button{width:100%;font:inherit;font-size:12.5px;font-weight:600;border:1px solid var(--ink);border-radius:8px;padding:9px;background:var(--ink);color:var(--paper);cursor:pointer}
  .side button.ghost{background:transparent;color:var(--ink2);border-color:var(--line);margin-top:7px}

  /* ── 메인 ── */
  .main{flex:1;overflow-y:auto;padding:54px 6vw 80px}
  .inner{max-width:760px;margin:0 auto}
  .kicker{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:10px}
  h1.pg{font-family:var(--serif);font-size:38px;line-height:1.15;font-weight:400;margin:0 0 6px;letter-spacing:-.01em}
  .lead{color:var(--mut);font-size:14.5px;margin:0 0 38px}

  /* 통계(에디토리얼) */
  .stats{display:flex;flex-wrap:wrap;gap:0;border-top:1px solid var(--ink);border-bottom:1px solid var(--line);margin:0 0 44px}
  .stat{flex:1;min-width:120px;padding:20px 22px 18px;border-right:1px solid var(--line)}
  .stat:last-child{border-right:none}
  .stat .v{font-family:var(--serif);font-size:34px;line-height:1;font-weight:400}
  .stat .v .u{font-size:15px;color:var(--mut);margin-left:3px}
  .stat .l{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut);margin-top:10px}
  .stat.hero .v{color:var(--accent)}

  /* 섹션 */
  .sec{font-family:var(--serif);font-size:21px;font-weight:400;margin:46px 0 4px;display:flex;align-items:baseline;gap:12px}
  .sec .note{font-family:var(--sans);font-size:12px;letter-spacing:.04em;color:var(--mut)}
  .rule{height:1px;background:var(--ink);margin:14px 0 4px}

  /* 리스트(헤어라인) */
  .item{display:grid;gap:16px;align-items:baseline;padding:15px 2px;border-bottom:1px solid var(--line)}
  .item:last-child{border-bottom:none}
  .d{font-family:var(--serif);font-size:16px;white-space:nowrap}
  .d .dw{font-family:var(--sans);font-size:11px;color:var(--mut);margin-left:4px}
  .ti{font-size:15px;font-weight:600}
  .mt{font-size:12.5px;color:var(--mut)}
  .st{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--mut);text-align:right;white-space:nowrap}
  .st.on{color:var(--green)}
  .idx{font-family:var(--serif);font-size:15px;color:var(--faint);width:42px}
  .barwrap{display:flex;align-items:center;gap:10px}
  .bar{flex:1;height:2px;background:var(--line)}
  .bar>div{height:100%;background:var(--accent)}

  /* 캘린더 */
  .calhead{display:flex;align-items:center;gap:16px;margin:6px 0 16px;flex-wrap:wrap}
  .calnav{display:flex;gap:6px}
  .calnav button{font:inherit;font-size:13px;border:1px solid var(--line);background:var(--paper);color:var(--ink2);border-radius:7px;padding:5px 12px;cursor:pointer}
  .calnav button:hover{border-color:var(--ink);color:var(--ink)}
  .calmon{font-family:var(--serif);font-size:23px}
  .calleg{margin-left:auto;display:flex;gap:14px;font-size:11px;color:var(--mut)}
  .calleg .lg{display:flex;align-items:center;gap:6px}
  .calleg .lg:before{content:"";width:9px;height:9px;border-radius:2px;background:var(--mut)}
  .calleg .lg.consult:before{background:var(--accent)}
  .calleg .lg.kit:before{background:var(--green)}
  .calleg .lg.reel:before{background:#3f6fb0}
  .calgrid{display:grid;grid-template-columns:repeat(7,1fr);border-top:1px solid var(--ink);border-left:1px solid var(--line)}
  .caldow{font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);padding:6px 8px;border-right:1px solid var(--line);border-bottom:1px solid var(--line)}
  .calcell{min-height:94px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:5px 6px;cursor:pointer;overflow:hidden}
  .calcell:hover{background:#f7f3ec}
  .calcell.out{background:#f6f3ec;cursor:default}
  .calcell.out .cn{color:var(--faint)}.calcell.out:hover{background:#f6f3ec}
  .calcell.sel{background:#f3ece2;box-shadow:inset 0 0 0 1.5px var(--ink)}
  .cn{font-family:var(--serif);font-size:14px;color:var(--ink2);margin-bottom:3px}
  .calcell.today .cn{color:var(--accent);font-weight:700}
  .ev{font-size:10px;line-height:1.5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-left:8px;position:relative;color:var(--ink2)}
  .ev:before{content:"";position:absolute;left:0;top:3px;bottom:3px;width:3px;border-radius:2px;background:var(--mut)}
  .ev.consult:before{background:var(--accent)}
  .ev.kit:before{background:var(--green)}
  .ev.reel:before{background:#3f6fb0}
  .evmore{font-size:9.5px;color:var(--faint);padding-left:8px}
  .modetog{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;margin:0 0 26px}
  .modetog button{font:inherit;font-size:12.5px;border:none;background:var(--paper);color:var(--mut);padding:7px 15px;cursor:pointer}
  .modetog button:first-child{border-right:1px solid var(--line)}
  .modetog button.on{background:var(--ink);color:var(--paper)}

  /* 릴스 — ER·정렬 칩·반응패턴 */
  .sortbar{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 10px}
  .sortlbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);align-self:center;margin-right:4px}
  .chip{font:inherit;font-size:12px;border:1px solid var(--line);background:var(--paper);color:var(--ink2);border-radius:20px;padding:5px 13px;cursor:pointer}
  .chip:hover{border-color:var(--ink)}
  .chip.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .reelitem{padding:16px 2px;border-bottom:1px solid var(--line)}
  .reelitem:last-child{border-bottom:none}
  .rtop{display:flex;align-items:baseline;gap:10px}
  .rtop .nm{font-size:15px;font-weight:600;flex:1}
  .met{display:flex;flex-wrap:wrap;gap:5px 16px;font-size:12px;color:var(--mut);margin-top:8px}
  .met .hl{color:var(--accent);font-weight:700}
  .rint{font-size:12px;color:var(--mut);font-style:italic;margin-top:7px;line-height:1.5}
  .reelitem .bar{height:2px;background:var(--line);margin-top:10px}
  .reelitem .bar>div{height:100%;background:var(--accent)}
  .pat{font-size:10px;letter-spacing:.03em;padding:2px 9px;border-radius:11px;white-space:nowrap;border:1px solid var(--line);color:var(--mut)}
  .pat.hot{color:var(--accent);border-color:#f0c4b6;background:#fbeee8}
  .pat.deep{color:var(--green);border-color:#bfe0cc;background:#eaf5ee}
  .pat.flat{color:var(--mut);background:#f2efe8}
  .pat.new{color:var(--faint)}

  /* 클릭 행 + 미리보기 드로어 */
  .clk{cursor:pointer;transition:background .1s}
  .clk:hover{background:#f3ece2}
  .ov{position:fixed;inset:0;z-index:50;display:none}
  .ov.show{display:block}
  .ovbg{position:absolute;inset:0;background:rgba(28,26,23,.34)}
  .ovpane{position:absolute;top:0;right:0;height:100%;width:min(580px,94vw);background:var(--paper);border-left:1px solid var(--line);box-shadow:-10px 0 44px rgba(0,0,0,.13);display:flex;flex-direction:column;padding:30px 34px 44px;overflow-y:auto}
  .ovhead{display:flex;align-items:flex-start;gap:14px}
  .ovtitle{font-family:var(--serif);font-size:25px;line-height:1.28;flex:1}
  .ovx{font:inherit;font-size:17px;border:none;background:transparent;color:var(--mut);cursor:pointer;padding:2px 6px;flex:none}
  .ovx:hover{color:var(--ink)}
  .ovpath{font-size:11px;color:var(--faint);margin:6px 0 0;word-break:break-all}
  .ovopen{display:inline-block;align-self:flex-start;margin:16px 0 24px;font-size:12.5px;font-weight:600;color:var(--paper);background:var(--ink);border-radius:8px;padding:9px 16px;text-decoration:none}
  .ovopen:hover{background:#000}
  .ovbody{font-size:14.5px;line-height:1.72;color:var(--ink2)}
  .ovbody h2,.ovbody h3,.ovbody h4,.ovbody h5{font-family:var(--serif);font-weight:400;color:var(--ink);margin:24px 0 7px;line-height:1.3}
  .ovbody h2{font-size:22px}.ovbody h3{font-size:18px}.ovbody h4{font-size:15.5px}.ovbody h5{font-size:14px}
  .ovbody p{margin:9px 0}
  .ovbody ul{margin:9px 0;padding-left:20px}.ovbody li{margin:3px 0}
  .ovbody blockquote{border-left:2px solid var(--line);margin:13px 0;padding:3px 0 3px 14px;color:var(--mut)}
  .ovbody a{color:var(--accent);word-break:break-all}
  .ovbody .wl{color:var(--accent)}
  .ovbody code{font-size:12px}
  .mdt{border-collapse:collapse;width:100%;margin:12px 0;font-size:12.5px}
  .mdt td{border:1px solid var(--line);padding:5px 9px;vertical-align:top}
  .mdt tr:first-child td{background:#f2efe8;font-weight:600;color:var(--ink)}

  /* 브랜드 코어 */
  .bhero{border:1px solid var(--ink);border-radius:12px;padding:22px 24px;margin:0 0 30px;background:linear-gradient(180deg,#fff,#faf6ef)}
  .bhero .lbl{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:9px}
  .bhero .txt{font-family:var(--serif);font-size:19px;line-height:1.55;color:var(--ink)}
  .bhero .txt b{color:var(--accent);font-weight:400}
  .bcards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin:4px 0 8px}
  .bcard{border:1px solid var(--line);border-radius:10px;padding:14px 16px;cursor:pointer;transition:border-color .12s,background .12s}
  .bcard:hover{border-color:var(--ink);background:#f7f3ec}
  .bcard .bt{font-size:13.5px;font-weight:600;margin-bottom:3px}
  .bcard .bd{font-size:11.5px;color:var(--mut);line-height:1.45}
  .bcard .bgo{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-top:8px}
  .brandbody{font-size:14px;line-height:1.7;color:var(--ink2)}
  .brandbody h2,.brandbody h3,.brandbody h4,.brandbody h5{font-family:var(--serif);font-weight:400;color:var(--ink);margin:26px 0 7px;line-height:1.3}
  .brandbody h2{font-size:21px}.brandbody h3{font-size:17px}.brandbody h4{font-size:14.5px}
  .brandbody p{margin:8px 0}.brandbody ul{margin:8px 0;padding-left:20px}.brandbody li{margin:3px 0}
  .brandbody blockquote{border-left:2px solid var(--accent);margin:13px 0;padding:4px 0 4px 14px;color:var(--mut);background:#faf6ef}
  .brandbody a,.brandbody .wl{color:var(--accent)}
  .brandbody code{font-size:12px}

  /* 재윤 OS 체크 */
  .ck{display:flex;gap:13px;align-items:flex-start;padding:15px 2px;border-bottom:1px solid var(--line);cursor:pointer}
  .ck:last-child{border-bottom:none}
  .box{width:18px;height:18px;border:1.5px solid var(--faint);border-radius:4px;flex:none;margin-top:3px;display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent}
  .ck.on .box{background:var(--ink);border-color:var(--ink);color:var(--paper)}
  .ck .t{font-size:15px}
  .ck.on .t{color:var(--mut);text-decoration:line-through}

  /* 입력 */
  input[type=text],textarea{width:100%;font:inherit;border:none;border-bottom:1px solid var(--line);background:transparent;padding:11px 2px;color:var(--ink)}
  textarea{resize:vertical;line-height:1.7}
  input[type=text]:focus,textarea:focus{outline:none;border-color:var(--ink)}
  .ph{font-family:var(--serif);font-size:18px;border-bottom:1px solid var(--ink);padding-bottom:8px}
  .act{margin-top:22px;font:inherit;font-size:13px;font-weight:600;border:1px solid var(--ink);background:var(--ink);color:var(--paper);border-radius:8px;padding:11px 20px;cursor:pointer;letter-spacing:.02em}
  .ok{margin-top:18px;font-size:13px;color:var(--green)}
  .warn{margin-top:14px;font-size:13px;color:var(--accent)}
  .empty{padding:40px 0;text-align:center;color:var(--faint);font-family:var(--serif);font-size:16px}
  code{font-family:'SF Mono',Menlo,monospace;font-size:12px;background:#efe9de;padding:1px 6px;border-radius:4px}

  /* 게이트 */
  .gate{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
  .gate .mk{font-family:var(--serif);font-size:42px}.gate .mk .ax{color:var(--accent)}
  .gate p{color:var(--mut);font-size:14px;max-width:380px;margin:14px 0 26px}
  .soonbox{font-family:var(--serif);font-size:18px;color:var(--faint);padding:60px 0;text-align:center}
</style>
</head>
<body>
<div class="side">
  <div class="mark">RE:FEEEL <span class="ax">AX</span></div>
  <div class="tag">Workspace</div>
  <div class="navsec">기준</div>
  <div class="nav" data-v="brand"><span class="ic">🧬</span> 브랜드 코어</div>
  <div class="navsec">Dashboards</div>
  <div class="nav" data-v="home"><span class="ic">🏠</span> 운영홈</div>
  <div class="nav" data-v="consult"><span class="ic">🎯</span> 컨설팅</div>
  <div class="nav" data-v="crm"><span class="ic">👥</span> CRM</div>
  <div class="nav" data-v="kit"><span class="ic">📕</span> RE-KIT</div>
  <div class="nav" data-v="reel"><span class="ic">🎬</span> 릴스</div>
  <div class="nav" data-v="cal"><span class="ic">🗓️</span> 캘린더</div>
  <div class="nav" data-v="queue"><span class="ic">📤</span> 발행 큐</div>
  <div class="navsec">재무</div>
  <div class="nav" data-v="acct"><span class="ic">💰</span> 회계</div>
  <div class="nav" data-v="revc"><span class="ic">📊</span> 매출×콘텐츠</div>
  <div class="navsec">재윤 OS</div>
  <div class="nav" data-v="exec"><span class="ic">📍</span> 이번 스프린트</div>
  <div class="nav" data-v="jaeyun"><span class="ic">🧭</span> 원칙·오늘</div>
  <div class="nav" data-v="learn"><span class="ic">📚</span> 학습</div>
  <div class="nav" data-v="read"><span class="ic">📺</span> 콘텐츠 읽기</div>
  <div class="navsec">입출력</div>
  <div class="nav" data-v="capture"><span class="ic">✍️</span> 빠른캡처</div>
  <div class="nav" data-v="lint"><span class="ic">🧹</span> 볼트 점검</div>
  <div class="nav" data-v="ai"><span class="ic">🤖</span> AI 명령<span class="soon">곧</span></div>
  <div class="foot">
    <div class="vstat" id="vstat">미연결</div>
    <button id="pick">볼트 열기</button>
    <button id="reload" class="ghost" style="display:none">새로고침</button>
  </div>
</div>
<div class="main" id="main">
  <div class="gate">
    <div class="mk">RE:FEEEL <span class="ax">AX</span></div>
    <p>왼쪽 <b>볼트 열기</b>로 시작하세요.<br>옵시디언을 켜지 않아도, 볼트를 여기서 보고 씁니다.<br><span style="color:var(--faint);font-size:12px">크롬·엣지 전용 · 볼트 루트 폴더(낙타) 선택</span></p>
  </div>
</div>

<div class="ov" id="ov">
  <div class="ovbg" data-close></div>
  <div class="ovpane">
    <div class="ovhead"><div class="ovtitle"></div><button class="ovx" data-close>✕</button></div>
    <div class="ovpath"></div>
    <a class="ovopen" target="_blank">옵시디언에서 열기 ↗</a>
    <div class="ovbody"></div>
  </div>
</div>

<script>
const $=s=>document.querySelector(s), main=$('#main');
const state={root:null,view:'home',data:null,writable:false};

let DB;const idb=()=>new Promise(r=>{const q=indexedDB.open('refeeel-ax',1);q.onupgradeneeded=()=>q.result.createObjectStore('h');q.onsuccess=()=>r(q.result)});
const saveHandle=async h=>{DB=DB||await idb();return new Promise(r=>{DB.transaction('h','readwrite').objectStore('h').put(h,'v').onsuccess=()=>r()})};
const loadHandle=async()=>{DB=DB||await idb();return new Promise(r=>{const g=DB.transaction('h').objectStore('h').get('v');g.onsuccess=()=>r(g.result);g.onerror=()=>r(null)})};

function parseFront(t){const m=t.match(/^---\r?\n([\s\S]*?)\r?\n---/);if(!m)return{};const f={};for(const ln of m[1].split(/\r?\n/)){const x=ln.match(/^\s*([A-Za-z0-9_가-힣]+)\s*:\s*(.*)$/);if(!x)continue;f[x[1]]=x[2].trim().replace(/^["']|["']$/g,'').replace(/^\[\[|\]\]$/g,'');}return f;}
const N=v=>Number(String(v||'').replace(/[^0-9.]/g,''))||0;
const pickDate=s=>{const m=String(s||'').match(/(\d{4})-(\d{1,2})-(\d{1,2})/);return m?new Date(+m[1],+m[2]-1,+m[3]):null;};
const esc=s=>String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const md=d=>`${d.getMonth()+1}.${d.getDate()}`, dow=d=>'일월화수목금토'[d.getDay()];
const num=n=>(Number(n)||0).toLocaleString('ko-KR');
const today=()=>{const d=new Date();d.setHours(0,0,0,0);return d;};
const monthStart=d=>new Date(d.getFullYear(),d.getMonth(),1);
const dkey=d=>d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate();

async function getDir(root,parts,create=false){let h=root;for(const p of parts)h=await h.getDirectoryHandle(p,{create});return h;}
async function collectMd(dir,acc,prefix){for await(const[name,h]of dir.entries()){if(h.kind==='directory')await collectMd(h,acc,prefix+name+'/');else if(name.endsWith('.md')){try{const f=await h.getFile();acc.push({name,path:prefix+name,handle:h,front:parseFront(await f.text())});}catch(e){}}}}
async function readFolder(root,parts){const acc=[];try{await collectMd(await getDir(root,parts),acc,parts.join('/')+'/');}catch(e){return{error:parts.join('/'),items:[]};}return{items:acc};}
async function readCsv(root,parts,filename){try{const dir=await getDir(root,parts);const fh=await dir.getFileHandle(filename);const t=await(await fh.getFile()).text();const lines=t.trim().split(/\r?\n/);const hdr=(lines.shift()||'').split(',');return lines.filter(Boolean).map(ln=>{const c=ln.split(',');const o={};hdr.forEach((h,i)=>o[h.trim()]=(c[i]||'').trim());return o;});}catch(e){return [];}}
async function readAcct(root){return {raw:await readCsv(root,['40_프로젝트','회계'],'매출_raw.csv'),daily:await readCsv(root,['40_프로젝트','회계'],'매출_일별.csv'),exp:await readCsv(root,['40_프로젝트','회계'],'지출_카드.csv')};}
function tierOf(a){a=Number(a)||0;if(a===0)return '무료';if(a<=10000)return 'RE:KIT';if(a<=160000)return '클래스·중가';if(a<=400000)return '심화';return '고가';}
const inRange=(d,r)=>d>=r.from&&d<=r.to;
function periodRange(){const p=state.period||'all';const iso=x=>x.toISOString().slice(0,10);const today=iso(new Date());const minus=n=>{const d=new Date();d.setDate(d.getDate()-n);return iso(d);};if(p==='7d')return{from:minus(6),to:today,label:'최근 7일'};if(p==='30d')return{from:minus(29),to:today,label:'최근 30일'};if(p.startsWith('m:')){const m=p.slice(2);return{from:m+'-01',to:m+'-31',label:m};}return{from:'0000-00-00',to:'9999-99-99',label:'전체'};}
function periodBar(months){const p=state.period||'all';const b=(k,l)=>`<button data-p="${k}" class="${p===k?'on':''}">${l}</button>`;return `<div class="modetog" style="flex-wrap:wrap;gap:0;margin-bottom:14px">`+b('all','전체')+b('30d','최근30일')+b('7d','최근7일')+(months||[]).map(m=>b('m:'+m,m.slice(2)+'월')).join('')+`</div>`;}

async function writeFile(root,parts,filename,content){const dir=await getDir(root,parts,true);const fh=await dir.getFileHandle(filename,{create:true});const w=await fh.createWritable();await w.write(content);await w.close();}

async function loadData(root){
  const[con,kit,reel]=await Promise.all([
    readFolder(root,['70_컨설팅케이스']),
    readFolder(root,['40_프로젝트','RE-KIT','90_발행본']),
    readFolder(root,['40_프로젝트','릴스분석자동화','릴스노트']),
  ]);
  return{cases:con.items.filter(p=>p.front['세션일']),kits:kit.items.filter(p=>p.front['번호']),
    reels:reel.items.filter(p=>p.front['조회수']!==undefined||p.front['shortcode']),
    errs:[con,kit,reel].filter(x=>x.error).map(x=>x.error)};
}

const REELSORT={
  views:{l:'조회수',f:r=>r.v,fmt:r=>num(r.v)},
  er:{l:'ER',f:r=>r.er,fmt:r=>r.er.toFixed(1)+'%'},
  save:{l:'저장률',f:r=>r.saveR,fmt:r=>r.saveR.toFixed(2)+'%'},
  comment:{l:'댓글률',f:r=>r.cmtR,fmt:r=>r.cmtR.toFixed(2)+'%'},

const patCls=p=>/폭발/.test(p)?'hot':/누적|슬로우|꾸준|전환/.test(p)?'deep':/신규|대기/.test(p)?'new':'flat';
function reelRows(d){
  return d.reels.map(p=>{
    const f=p.front, v=N(f['조회수']), like=N(f['좋아요']), cmt=N(f['댓글']), save=N(f['저장']), reach=N(f['도달']);
    const base=reach||v||1;
    return {name:p.name,path:p.path,title:f['title']||p.name.replace('.md',''),v,like,cmt,save,reach,
      er:(like+cmt+save)/base*100, saveR:save/base*100, cmtR:cmt/base*100,
      pat:f['반응패턴']||'', intp:f['반응해석']||''};
  });
}
function viewReel(d){
  const rows=reelRows(d), n=rows.length;
  const tot=rows.reduce((a,r)=>a+r.v,0), totSave=rows.reduce((a,r)=>a+r.save,0);
  const avgER=n?rows.reduce((a,r)=>a+r.er,0)/n:0;
  let h=head('Performance','릴스','조회수는 표면 — 저장·댓글·도달·ER로 ‘깊은 콘텐츠’를 본다.');
  h+=`<div class="stats">${stat(n,'','릴스',1)}${stat(num(tot),'','총 조회수')}${stat(avgER.toFixed(1),'%','평균 ER')}${stat(num(totSave),'','총 저장')}</div>`;
  h+=modeToggle('reel');
  if(mode('reel')==='cal')return h+calRender(calEvents(d).filter(e=>e.kind==='reel'),'reel');
  const sk=REELSORT[state.reelSort]?state.reelSort:'er', S=REELSORT[sk];
  h+=`<div class="sortbar"><span class="sortlbl">정렬</span>${Object.keys(REELSORT).map(k=>`<button class="chip ${k===sk?'on':''}" data-sort="${k}">${REELSORT[k].l}</button>`).join('')}</div>`;
  if(!n)return h+'<div class="empty">릴스 데이터 없음</div>';
  const sorted=rows.slice().sort((a,b)=>S.f(b)-S.f(a));
  const mx=Math.max(1,...sorted.map(S.f));
  const cell=(active,label,val)=>`<span class="${active?'hl':''}">${label} ${val}</span>`;
  h+=`<div class="sec">${S.l} 순 <span class="note">${n}편</span></div><div class="rule"></div>`;
  h+=sorted.map(r=>`<div class="reelitem clk" data-note="${esc(r.path)}">
    <div class="rtop"><span class="nm">${esc(r.title)}</span>${r.pat?`<span class="pat ${patCls(r.pat)}">${esc(r.pat)}</span>`:''}</div>
    <div class="met">
      ${cell(sk==='views',' 조회',num(r.v))}
      <span>♥ ${num(r.like)}</span>
      ${cell(sk==='comment','댓글',num(r.cmt))}
      ${cell(sk==='save','저장',num(r.save))}
      ${cell(sk==='reach','도달',num(r.reach))}
      ${cell(sk==='er','ER',r.er.toFixed(1)+'%')}
      ${cell(sk==='save','저장률',r.saveR.toFixed(2)+'%')}
    </div>
    ${r.intp?`<div class="rint">${esc(r.intp)}</div>`:''}
    <div class="bar"><div style="width:${(S.f(r)/mx*100).toFixed(0)}%"></div></div></div>`).join('');
  return h;

function calEvents(d){
  const ev=[];
  (d.cases||[]).forEach(p=>{const dt=pickDate(p.front['세션일']);if(dt)ev.push({date:dt,kind:'consult',path:p.path,label:p.front['이름']||p.name.replace('.md',''),sub:p.front['상품']||'',extra:p.front['세션시각']||p.front['세션시간']||'',meta:p.front['status']||''});});

  (d.reels||[]).forEach(p=>{const dt=pickDate(p.front['published']);if(dt)ev.push({date:dt,kind:'reel',path:p.path,label:p.front['title']||p.name.replace('.md',''),sub:num(N(p.front['조회수']))+' 조회',extra:'',meta:''});});
  return ev;
}
const order=e=>({consult:0,kit:1,reel:2}[e.kind]);
// 재사용 캘린더 — events 배열과 네임스페이스(ns)별로 독립된 월/선택 상태를 가짐
function calRender(events,ns){
  state.cal=state.cal||{};
  const s=state.cal[ns]=state.cal[ns]||{month:monthStart(today()),sel:undefined};
  const base=s.month, y=base.getFullYear(), m=base.getMonth(), t=today();
  const byDay={};events.forEach(e=>{(byDay[dkey(e.date)]=byDay[dkey(e.date)]||[]).push(e);});
  let sel=s.sel;
  if(sel===undefined&&t.getFullYear()===y&&t.getMonth()===m)sel=dkey(t);
  const start=new Date(y,m,1).getDay(), days=new Date(y,m+1,0).getDate();
  const kinds=Object.keys(KIND).filter(k=>events.some(e=>e.kind===k));
  const cnt=k=>Object.keys(byDay).filter(x=>x.startsWith(y+'-'+m+'-')).reduce((a,x)=>a+byDay[x].filter(e=>e.kind===k).length,0);
  let h=`<div class="calhead">
    <div class="calnav"><button data-cal="prev" data-ns="${ns}">‹</button><button data-cal="today" data-ns="${ns}">오늘</button><button data-cal="next" data-ns="${ns}">›</button></div>
    <div class="calmon">${y}년 ${m+1}월</div>
    <div class="calleg">${kinds.map(k=>`<span class="lg ${k}">${KIND[k].c} ${cnt(k)}</span>`).join('')}</div>
  </div><div class="calgrid">`;
  '일월화수목금토'.split('').forEach(w=>h+=`<div class="caldow">${w}</div>`);
  const prevDays=new Date(y,m,0).getDate();
  for(let i=0;i<start;i++)h+=`<div class="calcell out"><div class="cn">${prevDays-start+1+i}</div></div>`;
  for(let day=1;day<=days;day++){
    const cd=new Date(y,m,day), k=dkey(cd), list=(byDay[k]||[]).sort((a,b)=>order(a)-order(b));
    h+=`<div class="calcell ${cd.getTime()===t.getTime()?'today':''} ${sel===k?'sel':''}" data-day="${k}" data-ns="${ns}"><div class="cn">${day}</div>`;
    list.slice(0,3).forEach(e=>h+=`<div class="ev ${e.kind}">${esc(e.label)}</div>`);
    if(list.length>3)h+=`<div class="evmore">+${list.length-3}</div>`;
    h+=`</div>`;
  }
  const trail=(7-(start+days)%7)%7;
  for(let i=1;i<=trail;i++)h+=`<div class="calcell out"><div class="cn">${i}</div></div>`;
  h+=`</div>`;
  if(sel&&byDay[sel]){
    const[yy,mm,dd]=sel.split('-').map(Number), sd=new Date(yy,mm,dd);
    h+=`<div class="sec">${md(sd)} <span class="note">${dow(sd)}요일 · ${byDay[sel].length}건</span></div><div class="rule"></div>`;
    h+=byDay[sel].sort((a,b)=>order(a)-order(b)).map(e=>`<div class="item clk" data-note="${esc(e.path||'')}" style="grid-template-columns:64px 1fr auto">
      <div class="st ${/완료/.test(e.meta)?'on':''}">${KIND[e.kind].c}</div>
      <div class="ti">${esc(e.label)} <span class="mt" style="font-weight:400">${esc(e.sub)}</span></div>
      <div class="mt">${esc(e.extra||e.meta||'')}</div></div>`).join('');
  }else h+=`<div class="empty" style="padding:26px 0">날짜를 클릭하면 그날 일정이 여기 표시돼요</div>`;
  return h;
}

function mdLite(src){
  const inl=s=>esc(s).replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/\[\[(.+?)\]\]/g,'<span class="wl">📄 $1</span>').replace(/`([^`]+)`/g,'<code>$1</code>').replace(/(https?:\/\/[^\s)]+)/g,'<a href="$1" target="_blank">$1</a>');
  let html='',inList=false,inTable=false;
  const closeBlocks=()=>{if(inList){html+='</ul>';inList=false;}if(inTable){html+='</table>';inTable=false;}};
  for(const ln of src.split(/\r?\n/)){
    if(/^\s*$/.test(ln)){closeBlocks();continue;}
    if(/^\|[\s:|-]+\|?\s*$/.test(ln)){continue;}                 // 표 구분선 스킵
    const tr=ln.match(/^\s*\|(.+)\|\s*$/);
    if(tr){if(!inTable){html+='<table class="mdt">';inTable=true;}html+='<tr>'+tr[1].split('|').map(c=>'<td>'+inl(c.trim())+'</td>').join('')+'</tr>';continue;}
    if(inTable){html+='</table>';inTable=false;}
    const li=ln.match(/^\s*[-*]\s+(.*)$/);
    if(li){if(!inList){html+='<ul>';inList=true;}html+='<li>'+inl(li[1])+'</li>';continue;}
    if(inList){html+='</ul>';inList=false;}
    const hd=ln.match(/^(#{1,5})\s+(.*)$/);
    if(hd){const lv=Math.min(hd[1].length+1,5);html+='<h'+lv+'>'+inl(hd[2])+'</h'+lv+'>';continue;}
    if(/^>\s?/.test(ln)){html+='<blockquote>'+inl(ln.replace(/^>\s?/,''))+'</blockquote>';continue;}
    html+='<p>'+inl(ln)+'</p>';
  }
  closeBlocks();
  return html;
}

function splitSections(body){
  const out=[];let cur=null;
  for(const ln of body.split(/\r?\n/)){
    const m=ln.match(/^(#{2,4})\s+(.*)$/);
    if(m){if(cur)out.push(cur);cur={title:m[2],body:''};}
    else if(cur)cur.body+=(cur.body?'\n':'')+ln;
  }
  if(cur)out.push(cur);
  return out.map(s=>({title:s.title,body:s.body.trim()}));
}

const LINT_SKIP=new Set(['80_아카이브','_staging','90_첨부','_tmp_media','_analysis','.obsidian','.git']);

async function scanVault(root){

        try{const raw=await(await h.getFile()).text();
          const clean=raw.replace(/```[\s\S]*?```/g,'').replace(/`[^`]*`/g,'');  // 코드블록·인라인코드 제외(예시·템플릿 링크 오탐 방지)
          const links=[...clean.matchAll(/\[\[([^\]]+?)\]\]/g)].map(m=>{const r=m[1].split('|')[0].split('#')[0].trim();return{raw:r,base:r.split('/').pop()};}).filter(x=>x.base&&!IMG_EXT.test(x.base)&&!/[${}%]/.test(x.raw)&&!/^(링크|예시|제목|이름|날짜|노트명|파일명)$/.test(x.raw));
          notes.push({name,base:name.replace(/\.md$/,''),path:prefix+name,handle:h,front:parseFront(raw),links});

function lintCompute(notes){

  const gov=/^(20_지식노트|40_프로젝트|50_사람·브랜드|70_컨설팅케이스)\//;
  const emptyGold=notes.filter(n=>gov.test(n.path)&&!/_MOC|MOC\.md$|index\.md$/i.test(n.name)&&(!n.front['context']||!n.front['output']));

  for(const t of ['RE:KIT','클래스·중가','심화','고가'])if(fT[t])h+=row(t,fT[t].s,{cnt:fT[t].n});
  h+=row('총매출 (과세표준 추정)',fS,{sub:true});
  h+=`<div class="mt" style="padding:6px 0 0 16px;color:var(--faint)">무료(0원) 주문 ${num(fr.filter(r=>N(r['결제액'])===0).length)}건 제외</div>`;
  h+=`<div class="sec">세금 · 비용 <span class="note" style="color:var(--accent)">⚠️ 지출은 샘플(홈택스 연동 전)</span></div><div class="rule"></div>`;
  h+=row('부가세 추정 (매출 ÷ 11)',fVat,{neg:true});
  for(const[k,v]of Object.entries(byC).sort((x,y)=>y[1]-x[1]))h+=row(k+' (샘플)',v,{neg:true});
  h+=row('비용 합계 (부가세+지출샘플)',fVat+sumE,{sub:true,neg:true});
  h+=`<div class="sec">순이익</div><div class="rule"></div>`;
  h+=`<div class="mt" style="padding:12px 0;line-height:1.7"><b>순이익 = 매출 − 부가세 − 지출.</b> 지금은 지출이 샘플이라 미산출.<br>홈택스에 사업용카드 연동 → 위 '비용'에 실제 지출이 들어오면 <b>순이익이 자동 계산</b>돼요.</div>`;
  h+=`<div class="sec">월별 매출 추이</div><div class="rule"></div>`;
  const mks=Object.keys(byM).sort();const mmx=Math.max(1,...mks.map(m=>byM[m].s));
  for(const m of mks){const v=byM[m];h+=`<div class="item" style="grid-template-columns:84px 1fr 130px 56px"><div class="d">${m}</div><div class="barwrap"><div class="bar"><div style="width:${(v.s/mmx*100).toFixed(0)}%"></div></div></div><div class="mt" style="text-align:right">${num(v.s)}원</div><div class="mt" style="text-align:right">${v.n}건</div></div>`;}
  return h;
}
function viewRevContent(){
  const a=state.acct||{raw:[]};const d=state.data||{reels:[],kits:[]};
  const raw=a.raw||[];
  if(!raw.length)return head('Revenue × Content','매출 × 콘텐츠','')+`<div class="empty">매출 데이터 없음 — 회계 먼저</div>`;
  const months=[...new Set(raw.map(r=>(r['날짜']||'').slice(0,7)).filter(Boolean))].sort();
  const R=periodRange();
  let h=head('Revenue × Content','매출 × 콘텐츠','"어떤 콘텐츠가 돈줄(클래스·심화·고가) 매출을 끄나" — 아임웹이 못 보는 교차.')+periodBar(months);
  const MONEY=['클래스·중가','심화','고가'];
  const rdt={};raw.forEach(r=>{const dt=r['날짜'];if(!dt)return;const t=tierOf(r['결제액']);rdt[dt]=rdt[dt]||{};rdt[dt][t]=(rdt[dt][t]||0)+N(r['결제액']);});
  const days=Object.keys(rdt).sort();const min=days[0],max=days[days.length-1];
  const pub={};
  (d.reels||[]).forEach(p=>{const dt=pickDate(p.front['published']);if(dt&&inRange(dt,R))(pub[dt]=pub[dt]||[]).push({t:'릴스',title:p.front['title']||p.name});});
  (d.kits||[]).forEach(p=>{const dt=pickDate(p.front['발행일']);if(dt&&inRange(dt,R))(pub[dt]=pub[dt]||[]).push({t:'RE-KIT',title:p.front['콘텐츠명']||''});});
  const toN=s=>{const x=s.split('-').map(Number);return Date.UTC(x[0],x[1]-1,x[2])/864e5;};
  const toD=n=>{const t=new Date(n*864e5);return `${t.getUTCFullYear()}-${String(t.getUTCMonth()+1).padStart(2,'0')}-${String(t.getUTCDate()).padStart(2,'0')}`;};
  // 발행 후 7일, 상품군별 합
  const items=[];
  for(const[dt,arr]of Object.entries(pub)){
    const s=toN(dt);let money=0,cov=0;const ts={};
    for(let i=0;i<7;i++){const k=toD(s+i);if(rdt[k]){cov++;for(const[t,v]of Object.entries(rdt[k])){ts[t]=(ts[t]||0)+v;if(MONEY.includes(t))money+=v;}}}
    if(cov>0)arr.forEach(x=>items.push({...x,dt,money,ts}));
  }
  items.sort((x,y)=>y.money-x.money);
  h+=`<div class="warn" style="font-size:12.5px">⚠️ 상관≠인과 · 스파이크는 소수 고액결제 — 추세로. <b>${R.label}</b> 발행분 (매출범위 ${min}~${max}).</div>`;
  h+=`<div class="sec">콘텐츠별 — 발행 후 7일 '돈줄 매출' 순 <span class="note">클래스+심화+고가</span></div><div class="rule"></div>`;
  const mx=Math.max(1,...items.map(x=>x.money));
  for(const x of items.slice(0,18)){
    const bd=['고가','심화','클래스·중가'].filter(t=>x.ts[t]).map(t=>`${t.replace('·중가','')} ${num(x.ts[t])}`).join(' · ')||'(돈줄 없음)';
    h+=`<div class="item" style="grid-template-columns:58px 48px 1fr 116px"><div class="d">${x.dt.slice(5)}</div><div class="mt">${x.t}</div><div><div class="ti">${esc((x.title||'').slice(0,26))}</div><div class="mt" style="font-size:11px">${bd}</div></div><div class="barwrap" style="gap:8px"><div class="bar"><div style="width:${(x.money/mx*100).toFixed(0)}%"></div></div><span class="mt" style="white-space:nowrap">${num(x.money)}</span></div></div>`;
  }
  return h;
}
// ── 이번 스프린트(실행) — 재윤 OS 실행 대시보드 노트를 읽어 로드맵·체크리스트를 렌더 ──
const EXEC_PATH=['00_대시보드'], EXEC_FILE='재윤 OS — 실행 대시보드.md';
async function loadExec(root){try{const dir=await getDir(root,EXEC_PATH);const h=await dir.getFileHandle(EXEC_FILE);const raw=await(await h.getFile()).text();return{raw,handle:h,path:EXEC_PATH.join('/')+'/'+EXEC_FILE};}catch(e){return{error:e.message};}}
function viewExec(){
  if(state.exec===undefined){
    if(!state.execLoading){state.execLoading=true;loadExec(state.root).then(x=>{state.exec=x;state.execLoading=false;renderView();});}
    return head('Execution','이번 스프린트','로드맵 · 체크리스트 — 매일 본다.')+'<div class="empty" style="padding:44px 0">실행판 읽는 중…</div>';
  }
  const e=state.exec;
  let h=head('Execution','이번 스프린트','로드맵 · 체크리스트 — 매일 본다. (데이터 = 재윤 OS 실행 대시보드 노트)');
  if(e.error)return h+`<div class="warn">실행판 노트를 못 찾았어요 (<code>${esc(EXEC_PATH.join('/')+'/'+EXEC_FILE)}</code>). 볼트 루트(낙타)를 골랐는지 확인하세요.</div>`;
  const vault=(state.root&&state.root.name)||'낙타';
  h+=`<a class="ovopen" target="_blank" href="obsidian://open?vault=${encodeURIComponent(vault)}&file=${encodeURIComponent(EXEC_PATH.join('/')+'/'+EXEC_FILE.replace(/\.md$/,''))}" style="margin:2px 0 22px">옵시디언에서 열기(체크는 여기서) ↗</a>`;
  const body=cardBody(e.raw||'').replace(/^(\s*[-*]\s+)\[ \]\s+/gm,'$1☐ ').replace(/^(\s*[-*]\s+)\[[xX]\]\s+/gm,'$1☑ ');
  h+=`<div class="brandbody">`+mdLite(body)+`</div>`;
  return h;
}
const VIEWS={brand:viewBrand,home:viewHome,consult:viewConsult,crm:viewCRM,kit:viewKit,reel:viewReel,cal:viewCal,queue:viewQueue,acct:viewAcct,revc:viewRevContent,exec:viewExec,jaeyun:viewJaeyun,capture:viewCapture,learn:viewLearn,read:viewRead,lint:viewLint,ai:viewAi};
const STATIC=['acct','revc','exec','jaeyun','capture','learn','read','ai'];
function renderView(){
  document.querySelectorAll('.nav').forEach(n=>n.classList.toggle('active',n.dataset.v===state.view));
  if(!state.root)return;
  const fn=VIEWS[state.view];
  main.innerHTML='<div class="inner">'+(STATIC.includes(state.view)?fn():fn(state.data||{cases:[],kits:[],reels:[],errs:[]}))+'</div>';
  if(state.view==='jaeyun')wireJaeyun();
  if(state.view==='capture')wireCapture();
  if(state.view==='learn')wireLearn();
  if(state.view==='acct'||state.view==='revc')wirePeriod();
  if(state.view==='read')wireRead();
  if(['cal','consult','kit','reel'].includes(state.view)){wireMode();wireCalNs();}
  if(state.view==='reel')wireReelSort();
  if(state.view==='lint')wireLint();
  wireNotes();
}
function wireLearn(){
  const rev=$('#lrReveal');if(rev)rev.onclick=()=>{state.learnAnswer=($('#lrA')||{}).value||'';state.learnRevealed=true;renderView();};
  const gr=$('#lrGrade');if(gr)gr.onclick=async()=>{
    state.learnAnswer=($('#lrA')||{}).value||'';state.learnGrading=true;state.learnFeedback='';renderView();
    const c=(state.cards||[]).find(x=>x.name===state.learnSel)||{front:{},body:''};
    try{const r=await fetch('/grade',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:c.front['질문']||'',model:c.body||'',answer:state.learnAnswer})});state.learnFeedback=(await r.json()).feedback||'(되물음 없음)';}
    catch(e){state.learnFeedback='AI 되물음은 브리지 서버가 켜져 있을 때 작동해요. 지금은 혼자 모드 — 적고 「펼치기 ↓」로 진행하세요.';}
    state.learnGrading=false;renderView();
  };
  const nx=$('#lrNext');if(nx)nx.onclick=()=>gradeCurrent(true);
  const ag=$('#lrAgain');if(ag)ag.onclick=()=>deferCurrent();
}
function wireJaeyun(){
  const key='jy-'+new Date().toISOString().slice(0,10);
  main.querySelectorAll('.ck').forEach(el=>el.onclick=()=>{
    let st=JSON.parse(localStorage.getItem(key)||'[]');const i=+el.dataset.i;
    st.includes(i)?st=st.filter(x=>x!==i):st.push(i);localStorage.setItem(key,JSON.stringify(st));el.classList.toggle('on');
  });
}
function wireCapture(){
  $('#capS').onclick=async()=>{
    const m=$('#capM'),title=$('#capT').value.trim(),body=$('#capB').value.trim();
    if(!body){m.innerHTML='<div class="warn">내용을 입력하세요</div>';return;}
    if(!state.writable){m.innerHTML='<div class="warn">쓰기 권한이 없어요. 볼트를 다시 열어 "편집 허용"을 누르세요.</div>';return;}
    const now=new Date(),pad=n=>String(n).padStart(2,'0');
    const stamp=`${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}`;
    const fname=`캡처_${stamp}.md`;
    const content=`---\ntitle: ${title||'빠른 캡처 '+stamp}\ncreated: ${now.toISOString().slice(0,10)}\ntype: 캡처\nsource: RE:FEEEL AX\ntags: [inbox, 캡처]\n---\n\n${body}\n`;
    try{await writeFile(state.root,['10_Inbox'],fname,content);m.innerHTML=`<div class="ok">✓ 저장됨 → <code>10_Inbox/${esc(fname)}</code> · 옵시디언에서 확인돼요.</div>`;$('#capB').value='';$('#capT').value='';}
    catch(e){m.innerHTML='<div class="warn">저장 실패: '+esc(e.message)+'</div>';}
  };
}
async function connect(handle){
  const perm=await handle.requestPermission({mode:'readwrite'});
  state.writable=(perm==='granted');
  if(!state.writable){const r=await handle.requestPermission({mode:'read'});if(r!=='granted'){main.innerHTML='<div class="gate"><div class="warn">폴더 권한이 필요해요.</div></div>';return;}}
  state.root=handle;state.saved=handle;await saveHandle(handle);
  $('#vstat').innerHTML=state.writable?'볼트 연결됨<br>읽기 + 쓰기':'볼트 연결됨<br>읽기만';
  $('#reload').style.display='';
  main.innerHTML='<div class="gate"><div class="empty">볼트 읽는 중…</div></div>';
  state.data=await loadData(handle);state.cards=await readCards(handle);state.acct=await readAcct(handle);state.content=await readContent(handle);renderView();
}
$('#pick').onclick=async()=>{
  if(state.saved){try{await connect(state.saved);return;}catch(e){}}  // 저장된 볼트 재연결(폴더 탐색 없이 권한만)
  if(!window.showDirectoryPicker){main.innerHTML='<div class="gate"><div class="warn">이 페이지에선 폴더 열기가 안 돼요.<br>① 크롬·엣지인지 ② 주소가 <code>http://localhost</code>인지 확인 (file:// 은 막힘).</div></div>';return;}
  try{await connect(await window.showDirectoryPicker());}catch(e){if(e.name!=='AbortError')main.innerHTML='<div class="gate"><div class="warn">'+esc(e.message||e.name)+'<br><span style="color:var(--mut);font-size:12px">file:// 이면 localhost로 열어야 해요.</span></div></div>';}};
$('#reload').onclick=async()=>{if(state.root){state.data=await loadData(state.root);state.cards=await readCards(state.root);state.acct=await readAcct(state.root);state.content=await readContent(state.root);state.learnQueue=undefined;state.exec=undefined;renderView();}};
document.querySelectorAll('.nav').forEach(n=>n.onclick=()=>{state.view=n.dataset.v;renderView();});
$('#ov').querySelectorAll('[data-close]').forEach(e=>e.onclick=closeOverlay);
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeOverlay();});
(async()=>{const h=await loadHandle();if(!h)return;state.saved=h;
  try{if(await h.queryPermission({mode:'readwrite'})==='granted'){await connect(h);return;}}catch(e){}
  $('#vstat').innerHTML='이전 볼트 있음<br>아래 버튼 한 번이면 재연결';$('#pick').textContent='볼트 다시 연결';
})();
</script>
